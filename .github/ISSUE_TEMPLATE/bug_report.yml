name: Bug report
description: Something renders or behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      description: Editor + version (VS Code / Cursor), extension version, OS.
    validations:
      required: true
