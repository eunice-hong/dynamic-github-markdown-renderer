name: Release

# Publish when a version tag is pushed, e.g. `git tag v0.0.2 && git push --tags`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Compile
        run: npm run compile

      # Build the .vsix once, then reuse it for both registries + the Release.
      - name: Package
        run: npx vsce package --out github-issue-title-renderer.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath github-issue-title-renderer.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Open VSX powers Cursor / VSCodium. Skips automatically if no token is set.
      # create-namespace is first-publish-only; `|| true` makes reruns idempotent.
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          npx ovsx create-namespace eunice-hong -p "$OVSX_PAT" || true
          npx ovsx publish github-issue-title-renderer.vsix -p "$OVSX_PAT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: github-issue-title-renderer.vsix
          generate_release_notes: true
